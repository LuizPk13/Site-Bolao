<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolão da COJUR</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top">
      <h1>Bolão da Copa</h1>
      <p>Created by Luiz and designed by André e Matheus</p>
    </header>

    <div class="content-shell">
      <aside class="side-column side-column-left">
        <img class="side-photo" src="Imagens/André.jpeg" alt="Foto do André" />
        <img class="side-photo" src="Imagens/Cristiano.jpeg" alt="Foto do Cristiano" />
        <img class="side-photo" src="Imagens/Neide.jpeg" alt="Foto da Neide">
        <img class="side-photo" src="Imagens/Generico-Maurcio.jpeg" alt="Foto do Generico-Maurcio">
      </aside>

      <main class="container">
        <section class="card">
          <h2>Grupos</h2>
          <div id="grupos" class="grid"></div>
        </section>

        <section class="card">
          <h2 id="tituloGrupo">Selecione um grupo</h2>

          <table class="table" id="tabelaGrupo">
            <thead>
              <tr>
                <th>Time</th>
                <th>Placar</th>
                <th></th>
                <th>Placar</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="corpoGrupo"></tbody>
          </table>
        </section>

        <section class="card">
          <h2>Palpites</h2>

          <div class="row filtros">
            <label for="participante">Participante:</label>
            <select id="participante"></select>

            <label for="grupoFiltro">Grupo:</label>
            <select id="grupoFiltro">
              <option value="">Todos</option>
            </select>
          </div>

          <div id="palpitesWrap" class="hidden">
            <h3 id="nomeSelecionado"></h3>
            <table class="table" id="palpites">
              <thead>
                <tr>
                  <th>Grupo</th>
                  <th>Jogo</th>
                  <th>Pontos</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <h2>Top participantes</h2>
          <table class="table" id="ranking">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Pontos</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>

      <aside class="side-column side-column-left">
        <img class="side-photo" src="Imagens/Luiz.jpeg" alt="Foto do Luiz" />
        <img class="side-photo" src="Imagens/Ramon.jpeg" alt="Ramon" />
        <img class="side-photo" src="Imagens/Matheus_Ary_Rhenan.jpeg" alt="Foto do Matheus-Ary-Rhenan">
        <img class="side-photo" src="Imagens/Fabiola.jpeg" alt="Foto da Fabiola">
        <img class="side-photo" src="Imagens/Evelyn.jpeg" alt="Foto da Evelyn">
      </aside>
    </div>

    <!-- SheetJS (ler XLSX no navegador) -->
    <script src="scripts.js"></script>
  </body>
</html>
